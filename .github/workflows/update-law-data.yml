name: Update law JSON

on:
  # public は git 追跡しない (Pages artifact で都度ビルド配信) ため、push では
  # deploy しない (commit 済データが無い)。定期実行 + 手動のみで public を
  # 再生成して deploy する。
  schedule:
    - cron: "0 18 * * *" # 毎日 ~03:00 JST。頻度は適宜調整。
  workflow_dispatch:
    inputs:
      provider:
        description: "egov provider (http | mock)"
        required: false
        default: "http"
        type: choice
        options: ["http", "mock"]
      date:
        description: "単日 YYYY-MM-DD (空なら state/latest.json から自動算出)"
        required: false
        type: string
      from_date:
        description: "(バックフィル) 開始日 YYYY-MM-DD"
        required: false
        type: string
      to_date:
        description: "(バックフィル) 終了日 YYYY-MM-DD"
        required: false
        type: string
      bulk_category:
        description: "(全件取得) e-Gov カテゴリ番号 1=憲法・法律, 2=政令・勅令, 3=府省令"
        required: false
        type: string
      bulk_limit:
        description: "(全件取得) 件数キャップ — 省略時は全件"
        required: false
        type: string
      bulk_concurrency:
        description: "(全件取得) 並列度 — 既定 4。e-Gov 過負荷で 503 が出る場合は 2"
        required: false
        type: string
        default: "4"
      snapshot_dates:
        description: "(任意) スナップショット生成日のCSV YYYY-MM-DD,...。空ならスナップショットは生成しない (diff は常に生成)。"
        required: false
        type: string
      force:
        description: "Rebuild public/ even if no new revisions"
        required: false
        default: false
        type: boolean
  schedule:
    # JST 06:30 / 12:30 / 18:30 / 翌 00:30 (UTC -9h)
    - cron: "30 21 * * *"
    - cron: "30 3 * * *"
    - cron: "30 9 * * *"
    - cron: "30 15 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # スケジュール重複を直列化、ただし手動 dispatch は割り込まない (cancel-in-progress: false)。
  group: update-law-json
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # bulk_category 指定時は数千件 × 200ms で 30 分超過しうるので余裕を取る。
    timeout-minutes: 360
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      new_xmls: ${{ steps.detect.outputs.new_xmls }}
    env:
      LAWPUB_PROVIDER: ${{ github.event.inputs.provider || 'http' }}
      # 既定は v1 API (path 構造: lawlists/{cat}, lawdata/{id}, updatelawlists/{yyyymmdd})。
      # v2 にしたい場合はリポジトリ Variables / Secrets で上書き。
      LAWPUB_EGOV_BASE_URL: https://laws.e-gov.go.jp/api/1
      # 任意。設定されていれば lawpub update 内部で build-snapshots が走る。
      LAWPUB_SNAPSHOT_DATES: ${{ github.event.inputs.snapshot_dates }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # state/latest.json を更新するために push 権限で取得。
          persist-credentials: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # CI run 間で .cache/ (raw XML revisions / 官報 PDF metadata) を永続化する。
      # job が途中で失敗しても (parse error など) cache が残るよう、
      # restore と save を分けて save に always() を付ける。
      - name: Restore lawpub cache
        id: lawpub-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: lawpub-cache-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            lawpub-cache-v1-${{ runner.os }}-

      - name: Build lawpub
        run: cargo build --release -p lawpub-cli

      # 改正履歴メタ (revisions_meta.jsonl) を R2 から復元する。
      # 手元で `lawpub fetch-revisions --all` を回した後 `bundle pack` で 1 ファイル
      # にして R2 にアップロードしてある想定。無ければ skip して進む (= 旧挙動)。
      - name: Restore revisions_meta from R2
        if: env.R2_BUCKET != '' && env.R2_ENDPOINT != ''
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          mkdir -p .cache
          if aws s3 cp "s3://$R2_BUCKET/revisions_meta.jsonl" .cache/revisions_meta.jsonl --endpoint-url "$R2_ENDPOINT" 2>/dev/null; then
            ls -lh .cache/revisions_meta.jsonl
            ./target/release/lawpub bundle-revisions-meta --mode unpack \
              --file .cache/revisions_meta.jsonl --dir .cache/revisions_meta
            echo "::notice::revisions_meta: $(ls .cache/revisions_meta | wc -l) files restored"
          else
            echo "::warning::revisions_meta.jsonl not found in R2 — skipping (timeline will only have snapshot events)"
          fi

      # 全件バルク: bulk_category が指定されたら全件取得して build-json する。
      # 数千件規模になるので timeout が長め (workflow 全体は timeout-minutes: 30 のまま;
      # 大規模カテゴリは bulk_limit でクランプ推奨)。
      - name: lawpub fetch-bulk
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.bulk_category != ''
        env:
          LAWPUB_BULK_CONCURRENCY: ${{ github.event.inputs.bulk_concurrency || '4' }}
        run: |
          ARGS=(fetch-bulk --category "${{ github.event.inputs.bulk_category }}" --cache .cache --provider "$LAWPUB_PROVIDER")
          if [ -n "${{ github.event.inputs.bulk_limit }}" ]; then
            ARGS+=(--limit "${{ github.event.inputs.bulk_limit }}")
          fi
          ./target/release/lawpub "${ARGS[@]}"
          ./target/release/lawpub build-json --input .cache --output public
          mkdir -p state
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > state/last_run.json <<EOF
          {
            "version": 1,
            "ran_at": "$ts",
            "provider": "$LAWPUB_PROVIDER",
            "dates": ["bulk-cat${{ github.event.inputs.bulk_category }}"],
            "new_xmls": -1,
            "errors": [],
            "changed": true
          }
          EOF

      # バックフィル分岐: from_date / to_date が両方指定されたら fetch-range で範囲取得し、
      # その後 build-json で public/ を再生成する。lawpub update より柔軟。
      - name: lawpub backfill (range)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.bulk_category == '' &&
          github.event.inputs.from_date != '' &&
          github.event.inputs.to_date != ''
        run: |
          ./target/release/lawpub fetch-range \
            --from "${{ github.event.inputs.from_date }}" \
            --to   "${{ github.event.inputs.to_date }}" \
            --cache .cache
          ./target/release/lawpub build-json --input .cache --output public
          # 後段の Detect changes が読めるように changed=true でマーカーを書く。
          mkdir -p state
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > state/last_run.json <<EOF
          {
            "version": 1,
            "ran_at": "$ts",
            "provider": "$LAWPUB_PROVIDER",
            "dates": ["${{ github.event.inputs.from_date }}..${{ github.event.inputs.to_date }}"],
            "new_xmls": -1,
            "errors": [],
            "changed": true
          }
          EOF

      - name: lawpub update (data refresh)
        if: >-
          github.event_name != 'push' &&
          !(github.event_name == 'workflow_dispatch' && (
            github.event.inputs.bulk_category != '' ||
            (github.event.inputs.from_date != '' && github.event.inputs.to_date != '')
          ))
        run: |
          ARGS=(--public public --cache .cache --provider "$LAWPUB_PROVIDER")
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS+=(--date "${{ github.event.inputs.date }}")
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS+=(--force)
          fi
          ./target/release/lawpub update "${ARGS[@]}"

      - name: lawpub kanpo-link (best-effort)
        if: github.event_name != 'push'
        run: ./target/release/lawpub kanpo-link --output public || true

      # 失敗しても cache を保存することで、次の run が途中まで取得した
      # XML を再利用できる。bulk が parse error で死んでも 8000+ 件は救う。
      - name: Save lawpub cache
        if: always() && (github.event_name != 'push')
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: lawpub-cache-v1-${{ runner.os }}-${{ github.run_id }}

      - name: Detect changes
        id: detect
        run: |
          changed=$(jq -r '.changed' state/last_run.json 2>/dev/null || echo true)
          new_xmls=$(jq -r '.new_xmls' state/last_run.json 2>/dev/null || echo 0)
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "new_xmls=$new_xmls" >> "$GITHUB_OUTPUT"
          echo "::notice::event=${{ github.event_name }} changed=$changed new_xmls=$new_xmls"
          jq . state/last_run.json || true

      # pnpm のバージョンは root package.json の `packageManager` フィールドから
      # 解決する。ここで version を併記すると pnpm/action-setup@v4 が二重指定で
      # 落ちる (ERR_PNPM_BAD_PM_VERSION)。
      - name: Setup pnpm
        if: steps.detect.outputs.changed == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: figma/pnpm-lock.yaml

      - name: Build web UI
        if: steps.detect.outputs.changed == 'true'
        working-directory: figma
        env:
          # Frontend が search.db を取りにいく URL。R2 公開 URL を渡す。
          # 未設定なら ./search.db (同 origin) を試す。
          VITE_SEARCH_DB_URL: ${{ secrets.R2_PUBLIC_URL && format('{0}/search.db', secrets.R2_PUBLIC_URL) || '' }}
          # 配信 JSON は gzip 事前圧縮するので SPA を圧縮モードでビルド (.gz を取得して展開)。
          VITE_COMPRESSED: '1'
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build

      # 履歴束 (history.ndjson.zst) の全件ビルドには 32GB の revision キャッシュが
      # 必要で CI では回せない。手元で生成して R2 に上げた prebuilt 束
      # (scripts/upload-history-bundles.sh) を取得し、public/ に上書きする。
      # 上書き後は manifest を実体から再生成して validate を通す。
      # 束が無ければ warn して続行 (= CI 内 cache から作った部分的な束のまま)。
      - name: Restore prebuilt history bundles from R2
        if: >-
          steps.detect.outputs.changed == 'true' &&
          env.R2_BUCKET != '' &&
          env.R2_ENDPOINT != ''
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          if aws s3 cp "s3://$R2_BUCKET/history-bundles.tar" /tmp/history-bundles.tar --endpoint-url "$R2_ENDPOINT" 2>/dev/null; then
            ls -lh /tmp/history-bundles.tar
            tar -xf /tmp/history-bundles.tar -C public
            n=$(find public/laws -name history.ndjson.zst | wc -l)
            echo "::notice::restored $n prebuilt history bundles from R2"
            # 束を上書きしたので manifest.json の sha256/bytes を実体から再計算する。
            ./target/release/lawpub rebuild-manifest --public public
          else
            echo "::warning::history-bundles.tar not found in R2 — keeping CI-built history (may be partial)"
          fi

      - name: Validate public JSON
        if: steps.detect.outputs.changed == 'true'
        run: ./target/release/lawpub validate --public public

      # search.db は git/Pages 配信に乗せず R2 (egress 無料) に置く。
      # validate を済ませてから upload + 削除し、manifest からも entry を抜く。
      - name: Upload search.db to R2
        if: >-
          steps.detect.outputs.changed == 'true' &&
          env.R2_BUCKET != '' &&
          env.R2_ENDPOINT != ''
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          if [ ! -f public/search.db ]; then
            echo "::warning::public/search.db not found, skipping R2 upload"
            exit 0
          fi
          ls -lh public/search.db
          aws s3 cp public/search.db "s3://$R2_BUCKET/search.db" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type 'application/x-sqlite3' \
            --cache-control 'public, max-age=300'
          rm -f public/search.db
          # manifest から search.db エントリを除去 (validate は終了済みなので OK)。
          tmp=$(mktemp)
          jq '.files |= map(select(.path != "search.db"))' public/manifest.json > "$tmp"
          mv "$tmp" public/manifest.json

      # 配信 JSON を gzip 事前圧縮 (*.json/*.ndjson -> *.gz, 元削除)。
      # validate 後・artifact 前に実行する。search.db は Range のため対象外。
      - name: Compress public JSON (gzip)
        if: steps.detect.outputs.changed == 'true'
        run: ./target/release/lawpub compress --public public --remove-original

      - name: Configure Pages
        if: steps.detect.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Commit changes
        # push:main は「既に main にあるものを deploy する」フローなので auto-commit はしない。
        if: steps.detect.outputs.changed == 'true' && github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # public/ は git 追跡しない (Pages artifact で deploy)。state/last_run.json は
          # per-run なので除外。state/latest.json は `lawpub update` 経路でのみ作られる。
          [ -f state/latest.json ] && git add state/latest.json || true
          if git diff --cached --quiet; then
            echo "::notice::lawpub reported changes, but git tree is clean — skipping commit"
          else
            git commit -m "chore(data): refresh law JSON (provider=${LAWPUB_PROVIDER}, +${{ steps.detect.outputs.new_xmls }} XML)"
            # push の競合は同時実行のスケジュール cron と重ならない限り起きない (concurrency group)。
            git push
          fi

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
