name: Update law JSON

on:
  # main merge: コード/データ変更を即座に Pages へ反映する。
  # GITHUB_TOKEN による自動 commit は workflow を再トリガしないので、
  # cron が auto-commit してもループしない。
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      provider:
        description: "egov provider (http | mock)"
        required: false
        default: "http"
        type: choice
        options: ["http", "mock"]
      date:
        description: "単日 YYYY-MM-DD (空なら state/latest.json から自動算出)"
        required: false
        type: string
      from_date:
        description: "(バックフィル) 開始日 YYYY-MM-DD"
        required: false
        type: string
      to_date:
        description: "(バックフィル) 終了日 YYYY-MM-DD"
        required: false
        type: string
      bulk_category:
        description: "(全件取得) e-Gov カテゴリ番号 1=憲法・法律, 2=政令・勅令, 3=府省令"
        required: false
        type: string
      bulk_limit:
        description: "(全件取得) 件数キャップ — 省略時は全件"
        required: false
        type: string
      force:
        description: "Rebuild public/ even if no new revisions"
        required: false
        default: false
        type: boolean
  schedule:
    # JST 06:30 / 12:30 / 18:30 / 翌 00:30 (UTC -9h)
    - cron: "30 21 * * *"
    - cron: "30 3 * * *"
    - cron: "30 9 * * *"
    - cron: "30 15 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # スケジュール重複を直列化、ただし手動 dispatch は割り込まない (cancel-in-progress: false)。
  group: update-law-json
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # bulk_category 指定時は数千件 × 200ms で 30 分超過しうるので余裕を取る。
    timeout-minutes: 360
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      new_xmls: ${{ steps.detect.outputs.new_xmls }}
    env:
      LAWPUB_PROVIDER: ${{ github.event.inputs.provider || 'http' }}
      # 既定は v1 API (path 構造: lawlists/{cat}, lawdata/{id}, updatelawlists/{yyyymmdd})。
      # v2 にしたい場合はリポジトリ Variables / Secrets で上書き。
      LAWPUB_EGOV_BASE_URL: https://laws.e-gov.go.jp/api/1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # state/latest.json を更新するために push 権限で取得。
          persist-credentials: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # CI run 間で .cache/ (raw XML revisions / 官報 PDF metadata) を永続化する。
      # これがないと毎回フル fetch しないと parse やり直しができないので、
      # parser を改善した後に --force で再ビルドだけする運用が成立する。
      - name: Restore lawpub cache
        id: lawpub-cache
        uses: actions/cache@v4
        with:
          path: .cache
          # キーは「日次 + last_run」で動かす。日付が変われば新規キーになるが
          # restore-keys で最近のキャッシュを引いてくる。
          key: lawpub-cache-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            lawpub-cache-v1-${{ runner.os }}-

      - name: Build lawpub
        run: cargo build --release -p lawpub-cli

      # main merge では既に commit 済の public/ を使う。e-Gov へは触らずに deploy だけ走る。
      - name: Mark force-deploy (push to main)
        if: github.event_name == 'push'
        run: |
          mkdir -p state
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > state/last_run.json <<EOF
          {
            "version": 1,
            "ran_at": "$ts",
            "provider": "skip-on-push",
            "dates": [],
            "new_xmls": 0,
            "errors": [],
            "changed": true
          }
          EOF

      # 全件バルク: bulk_category が指定されたら全件取得して build-json する。
      # 数千件規模になるので timeout が長め (workflow 全体は timeout-minutes: 30 のまま;
      # 大規模カテゴリは bulk_limit でクランプ推奨)。
      - name: lawpub fetch-bulk
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.bulk_category != ''
        run: |
          ARGS=(fetch-bulk --category "${{ github.event.inputs.bulk_category }}" --cache .cache --provider "$LAWPUB_PROVIDER")
          if [ -n "${{ github.event.inputs.bulk_limit }}" ]; then
            ARGS+=(--limit "${{ github.event.inputs.bulk_limit }}")
          fi
          ./target/release/lawpub "${ARGS[@]}"
          ./target/release/lawpub build-json --input .cache --output public
          mkdir -p state
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > state/last_run.json <<EOF
          {
            "version": 1,
            "ran_at": "$ts",
            "provider": "$LAWPUB_PROVIDER",
            "dates": ["bulk-cat${{ github.event.inputs.bulk_category }}"],
            "new_xmls": -1,
            "errors": [],
            "changed": true
          }
          EOF

      # バックフィル分岐: from_date / to_date が両方指定されたら fetch-range で範囲取得し、
      # その後 build-json で public/ を再生成する。lawpub update より柔軟。
      - name: lawpub backfill (range)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.bulk_category == '' &&
          github.event.inputs.from_date != '' &&
          github.event.inputs.to_date != ''
        run: |
          ./target/release/lawpub fetch-range \
            --from "${{ github.event.inputs.from_date }}" \
            --to   "${{ github.event.inputs.to_date }}" \
            --cache .cache
          ./target/release/lawpub build-json --input .cache --output public
          # 後段の Detect changes が読めるように changed=true でマーカーを書く。
          mkdir -p state
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > state/last_run.json <<EOF
          {
            "version": 1,
            "ran_at": "$ts",
            "provider": "$LAWPUB_PROVIDER",
            "dates": ["${{ github.event.inputs.from_date }}..${{ github.event.inputs.to_date }}"],
            "new_xmls": -1,
            "errors": [],
            "changed": true
          }
          EOF

      - name: lawpub update (data refresh)
        if: >-
          github.event_name != 'push' &&
          !(github.event_name == 'workflow_dispatch' && (
            github.event.inputs.bulk_category != '' ||
            (github.event.inputs.from_date != '' && github.event.inputs.to_date != '')
          ))
        run: |
          ARGS=(--public public --cache .cache --provider "$LAWPUB_PROVIDER")
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS+=(--date "${{ github.event.inputs.date }}")
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS+=(--force)
          fi
          ./target/release/lawpub update "${ARGS[@]}"

      - name: lawpub kanpo-link (best-effort)
        if: github.event_name != 'push'
        run: ./target/release/lawpub kanpo-link --output public || true

      - name: Detect changes
        id: detect
        run: |
          changed=$(jq -r '.changed' state/last_run.json 2>/dev/null || echo true)
          new_xmls=$(jq -r '.new_xmls' state/last_run.json 2>/dev/null || echo 0)
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "new_xmls=$new_xmls" >> "$GITHUB_OUTPUT"
          echo "::notice::event=${{ github.event_name }} changed=$changed new_xmls=$new_xmls"
          jq . state/last_run.json || true

      - name: Setup pnpm
        if: steps.detect.outputs.changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: figma/pnpm-lock.yaml

      - name: Build web UI
        if: steps.detect.outputs.changed == 'true'
        working-directory: figma
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Validate public JSON
        if: steps.detect.outputs.changed == 'true'
        run: ./target/release/lawpub validate --public public

      - name: Configure Pages
        if: steps.detect.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Commit changes
        # push:main は「既に main にあるものを deploy する」フローなので auto-commit はしない。
        if: steps.detect.outputs.changed == 'true' && github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # state/last_run.json は per-run なので除外。state/latest.json は
          # `lawpub update` 経路でのみ作られる (fetch-bulk / fetch-range は無し)。
          git add public
          [ -f state/latest.json ] && git add state/latest.json || true
          if git diff --cached --quiet; then
            echo "::notice::lawpub reported changes, but git tree is clean — skipping commit"
          else
            git commit -m "chore(data): refresh law JSON (provider=${LAWPUB_PROVIDER}, +${{ steps.detect.outputs.new_xmls }} XML)"
            # push の競合は同時実行のスケジュール cron と重ならない限り起きない (concurrency group)。
            git push
          fi

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
