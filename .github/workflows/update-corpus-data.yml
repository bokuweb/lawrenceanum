name: Update corpus data (kokkai / pubcomment / procurement)

# 国会会議録・パブコメ・調達情報を定期取得し、生キャッシュを R2 にアップロードする。
# **このワークフローは Pages へ deploy しない。** 配信は法令ワークフロー
# (update-law-data.yml) が R2 の各キャッシュを取り込んで laws と一緒に 1 つの
# public/ で行う (2 ワークフローが別々に Pages を上げると互いを clobber するため)。
#
# スケジュール: JST 毎朝 05:00 (UTC 20:00 前日)
#   - 法令 (06:30 JST) より早めに取得・R2 へ上げ、後続の法令 run が取り込めるようにする。
on:
  workflow_dispatch:
    inputs:
      provider:
        description: "provider (http | mock)"
        required: false
        default: "http"
        type: choice
        options: ["http", "mock"]
      domains:
        description: "カンマ区切りドメイン (kokkai,pubcomment,procurement,gian,reiki,shingikai,budget) / 空=全て"
        required: false
        type: string
      kokkai_session:
        description: "国会回次 (空=直近3会期を自動算出)"
        required: false
        type: string
  schedule:
    # JST 05:00 毎日
    - cron: "0 20 * * *"

permissions:
  # Pages へは deploy しない (法令ワークフローが配信)。state コミットと R2 upload のみ。
  contents: write

concurrency:
  group: update-corpus-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      LAWPUB_PROVIDER: ${{ github.event.inputs.provider || 'http' }}
      DOMAINS: ${{ github.event.inputs.domains || 'kokkai,pubcomment,procurement,gian' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Restore corpus cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: corpus-cache-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            corpus-cache-v1-${{ runner.os }}-

      - name: Build lawpub
        run: cargo build --release -p lawpub-cli

      # ── 国会会議録 ───────────────────────────────────────────────

      - name: Fetch kokkai (直近 3 会期)
        if: contains(env.DOMAINS, 'kokkai') || env.DOMAINS == ''
        run: |
          provider="${LAWPUB_PROVIDER}"
          # 会期番号: 入力があればそれ、なければ直近 3 会期を推定
          if [ -n "${{ github.event.inputs.kokkai_session }}" ]; then
            sessions="${{ github.event.inputs.kokkai_session }}"
          else
            # 現在の最新会期を kokkai API から取得し直近 3 会期を算出。
            # meeting_list は検索条件必須なので「直近60日の日付範囲」で引き、その中の
            # 最大 session を採る (旧コードは無条件 meeting_list で叩いていたが
            # HTTP 400「検索条件を指定してください」になり latest が空 → "-2,-1," と
            # なって何も取得できていなかった)。失敗時は安全側の固定値にフォールバック。
            from=$(date -u -d "60 days ago" +%Y-%m-%d 2>/dev/null || date -u -v-60d +%Y-%m-%d)
            until=$(date -u +%Y-%m-%d)
            latest=$(curl -sf "https://kokkai.ndl.go.jp/api/meeting_list?from=$from&until=$until&maximumRecords=100&recordPacking=json" \
              | jq -r '[.meetingRecord[].session] | max // empty' 2>/dev/null || true)
            if ! [ "${latest:-0}" -gt 0 ] 2>/dev/null; then
              echo "::warning::最新会期の自動検出に失敗 — フォールバック 221 を使用"
              latest=221
            fi
            sessions="$((latest-2)),$((latest-1)),$latest"
          fi
          echo "::notice::kokkai sessions: $sessions"
          for s in ${sessions//,/ }; do
            ./target/release/lawpub proceedings-fetch \
              --session "$s" --cache .cache --provider "$provider" || true
          done

      - name: Build kokkai JSON
        if: contains(env.DOMAINS, 'kokkai') || env.DOMAINS == ''
        run: |
          [ -d .cache/proceedings ] || { echo "::notice::no kokkai cache, skip"; exit 0; }
          mkdir -p public
          ./target/release/lawpub proceedings-build-json \
            --cache .cache --public public

      # ── 議事録キャッシュを R2 へ (法令ワークフローが配信元) ───────────
      # このワークフローは Pages へ deploy しない (法令ワークフロー update-law-data.yml が
      # laws と一緒に 1 つの public/ で配信する。2 ワークフローが別々に Pages を上げると
      # 互いを clobber するため)。ここでは生 kokkai キャッシュ (.cache/proceedings) を
      # zstd tar にして R2 (proceedings-cache.tar.zst) に置き、法令ワークフローの
      # 「Build proceedings from R2 cache」が取得 → build → link → 同梱 deploy する。
      # 会期の生 JSON は GH Actions cache (揮発) に依存せず R2 を真の source にする。
      - name: Upload proceedings cache to R2
        if: (contains(env.DOMAINS, 'kokkai') || env.DOMAINS == '') && env.R2_BUCKET != '' && env.R2_ENDPOINT != ''
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          [ -d .cache/proceedings ] || { echo "::notice::no proceedings cache, skip R2 upload"; exit 0; }
          n=$(find .cache/proceedings -name '*.json' | wc -l | tr -d ' ')
          # top-level を ./{session}/ にするため .cache/proceedings 内から固める。
          ( cd .cache/proceedings && tar -cf - . | zstd -19 --long -T0 -o /tmp/proceedings-cache.tar.zst -f )
          ls -lh /tmp/proceedings-cache.tar.zst
          aws s3 cp /tmp/proceedings-cache.tar.zst "s3://$R2_BUCKET/proceedings-cache.tar.zst" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type 'application/zstd' \
            --cache-control 'public, max-age=300'
          echo "::notice::uploaded proceedings cache to R2 ($n meeting files)"

      # ── パブコメ ─────────────────────────────────────────────────

      - name: Fetch pubcomment
        if: contains(env.DOMAINS, 'pubcomment') || env.DOMAINS == ''
        run: |
          # both = 意見募集中(締切前) + 結果公示済み。募集中は締切アラートの要。
          ./target/release/lawpub pubcomment-fetch \
            --cache .cache --provider "${LAWPUB_PROVIDER}" --max-pages 50 --status both || true

      - name: Build pubcomment JSON
        if: contains(env.DOMAINS, 'pubcomment') || env.DOMAINS == ''
        run: |
          [ -d .cache/pubcomment ] || { echo "::notice::no pubcomment cache, skip"; exit 0; }
          mkdir -p public
          ./target/release/lawpub pubcomment-build-json \
            --cache .cache --public public

      # ── パブコメキャッシュを R2 へ (法令ワークフローが配信元) ─────────
      # proceedings と同じ方式。このワークフローは Pages へ deploy せず、法令ワークフロー
      # (update-law-data.yml) が R2 の pubcomment-cache.tar.zst を取得 → build-json →
      # link-laws-and-pubcomment して laws と同梱 deploy する。法令 ↔ パブコメの link は
      # public/laws/index.json が必要で、それが揃うのは法令ワークフロー側のため、ここでは
      # 生 pubcomment キャッシュ (.cache/pubcomment/{case_id}.json) を上げるまでが責務。
      - name: Upload pubcomment cache to R2
        if: (contains(env.DOMAINS, 'pubcomment') || env.DOMAINS == '') && env.R2_BUCKET != '' && env.R2_ENDPOINT != ''
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          [ -d .cache/pubcomment ] || { echo "::notice::no pubcomment cache, skip R2 upload"; exit 0; }
          n=$(find .cache/pubcomment -name '*.json' | wc -l | tr -d ' ')
          # top-level を ./{case_id}.json にするため .cache/pubcomment 内から固める。
          ( cd .cache/pubcomment && tar -cf - . | zstd -19 --long -T0 -o /tmp/pubcomment-cache.tar.zst -f )
          ls -lh /tmp/pubcomment-cache.tar.zst
          aws s3 cp /tmp/pubcomment-cache.tar.zst "s3://$R2_BUCKET/pubcomment-cache.tar.zst" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type 'application/zstd' \
            --cache-control 'public, max-age=300'
          echo "::notice::uploaded pubcomment cache to R2 ($n cases)"

      # ── 議案 (法案審議トラッキング) ───────────────────────────────
      - name: Fetch gian
        if: contains(env.DOMAINS, 'gian') || env.DOMAINS == ''
        run: |
          # session=0 = 最新会期 (継続審議は審議経過の議案提出回次から正しい会期に)。
          ./target/release/lawpub gian-fetch \
            --cache .cache --provider "${LAWPUB_PROVIDER}" --session 0 || true

      - name: Upload gian cache to R2
        if: (contains(env.DOMAINS, 'gian') || env.DOMAINS == '') && env.R2_BUCKET != '' && env.R2_ENDPOINT != ''
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          [ -d .cache/gian ] || { echo "::notice::no gian cache, skip R2 upload"; exit 0; }
          n=$(find .cache/gian -name '*.json' | wc -l | tr -d ' ')
          # top-level を ./{session}/{bill_id}.json にするため .cache/gian 内から固める。
          ( cd .cache/gian && tar -cf - . | zstd -19 --long -T0 -o /tmp/gian-cache.tar.zst -f )
          aws s3 cp /tmp/gian-cache.tar.zst "s3://$R2_BUCKET/gian-cache.tar.zst" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type 'application/zstd' \
            --cache-control 'public, max-age=300'
          echo "::notice::uploaded gian cache to R2 ($n bills)"

      # ── 調達情報 ─────────────────────────────────────────────────

      - name: Fetch procurement (直近 30 日)
        if: contains(env.DOMAINS, 'procurement') || env.DOMAINS == ''
        run: |
          from=$(date -u -d "30 days ago" +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          to=$(date -u +%Y-%m-%d)
          ./target/release/lawpub procurement-fetch \
            --from "$from" --to "$to" \
            --cache .cache --provider "${LAWPUB_PROVIDER}" || true

      - name: Build procurement JSON
        if: contains(env.DOMAINS, 'procurement') || env.DOMAINS == ''
        run: |
          [ -d .cache/procurement ] || { echo "::notice::no procurement cache, skip"; exit 0; }
          mkdir -p public
          ./target/release/lawpub procurement-build-json \
            --cache .cache --public public

      # ── 審議会（手動のみ、頻度低） ────────────────────────────────

      - name: Fetch shingikai (moj)
        if: contains(env.DOMAINS, 'shingikai')
        run: |
          ./target/release/lawpub shingiakai-fetch \
            --ministry moj --cache .cache --provider "${LAWPUB_PROVIDER}" || true
          ./target/release/lawpub shingiakai-build-json \
            --cache .cache --public public || true

      # ── 予算（手動のみ、appId 必要） ─────────────────────────────

      - name: Fetch budget (e-Stat)
        if: contains(env.DOMAINS, 'budget') && env.LAWPUB_ESTAT_APP_ID != ''
        env:
          LAWPUB_ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}
        run: |
          ./target/release/lawpub budget-fetch \
            --cache .cache --provider "${LAWPUB_PROVIDER}" || true
          ./target/release/lawpub budget-build-json \
            --cache .cache --public public || true

      # ── 例規（手動のみ、頻度低） ─────────────────────────────────

      - name: Fetch reiki
        if: contains(env.DOMAINS, 'reiki')
        run: |
          ./target/release/lawpub reiki-fetch \
            --cache .cache --provider "${LAWPUB_PROVIDER}" || true

      - name: Upload reiki cache to R2
        if: contains(env.DOMAINS, 'reiki') && env.R2_BUCKET != '' && env.R2_ENDPOINT != ''
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          [ -d .cache/reiki ] || { echo "::notice::no reiki cache, skip R2 upload"; exit 0; }
          n=$(find .cache/reiki -name '*.json' | wc -l | tr -d ' ')
          # top-level を ./{muni_code}/{reiki_id}.json にするため .cache/reiki 内から固める。
          ( cd .cache/reiki && tar -cf - . | zstd -19 --long -T0 -o /tmp/reiki-cache.tar.zst -f )
          aws s3 cp /tmp/reiki-cache.tar.zst "s3://$R2_BUCKET/reiki-cache.tar.zst" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type 'application/zstd' \
            --cache-control 'public, max-age=300'
          echo "::notice::uploaded reiki cache to R2 ($n reiki)"

      # ── キャッシュ保存 ────────────────────────────────────────────

      - name: Save corpus cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: corpus-cache-v1-${{ runner.os }}-${{ github.run_id }}

      # ── 実行記録 ──────────────────────────────────────────────────
      # このワークフローは Pages へ deploy しない。配信は法令ワークフロー
      # (update-law-data.yml) が R2 の各キャッシュ (proceedings-cache.tar.zst 等) を
      # 取り込んで laws と一緒に 1 つの public/ で行う。ここは fetch/build して
      # R2 にアップロードするまでが責務。実行時刻だけ記録する。
      - name: Commit state
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p state
          echo "{\"updated_at\":\"$ts\",\"domains\":\"${DOMAINS}\"}" > state/corpus_latest.json
          git add state/corpus_latest.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(corpus): refresh corpus data ($ts)"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase origin main || true
          done
